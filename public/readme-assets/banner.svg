<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 600" width="1600" height="600" role="img" aria-label="Clan World: Ælder Whispers — banner">
  <defs>
    <radialGradient id="bgGold" cx="50%" cy="0%" r="80%">
      <stop offset="0%" stop-color="#f5c542" stop-opacity="0.35"></stop>
      <stop offset="60%" stop-color="#7a5210" stop-opacity="0.0"></stop>
    </radialGradient>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1d160a"></stop>
      <stop offset="100%" stop-color="#0a0805"></stop>
    </linearGradient>
    <linearGradient id="goldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3b8"></stop>
      <stop offset="50%" stop-color="#f5c542"></stop>
      <stop offset="100%" stop-color="#a8740e"></stop>
    </linearGradient>
    <linearGradient id="solGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9945ff"></stop>
      <stop offset="100%" stop-color="#14f195"></stop>
    </linearGradient>
    <pattern id="dots" width="6" height="6" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.6" fill="#3a2c14"></circle>
    </pattern>
    <pattern id="scan" width="2" height="3" patternUnits="userSpaceOnUse">
      <rect width="2" height="1" fill="rgba(245,197,66,0.05)"></rect>
    </pattern>
    <filter id="hardShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feOffset in="SourceAlpha" dx="0" dy="6"></feOffset>
      <feFlood flood-color="#000" flood-opacity="0.5"></feFlood>
      <feComposite in2="SourceAlpha" operator="in"></feComposite>
      <feMerge><feMergeNode></feMergeNode><feMergeNode in="SourceGraphic"></feMergeNode></feMerge>
    </filter>
  </defs>

  
  <rect width="1600" height="600" fill="url(#bg)"></rect>
  <rect width="1600" height="600" fill="url(#bgGold)"></rect>
  <rect width="1600" height="600" fill="url(#scan)"></rect>

  
  <g shape-rendering="crispEdges">
    
    <g fill="#2b2415">
      <rect x="0" y="380" width="1600" height="220"></rect>
      <polygon points="0,380 80,340 160,380"></polygon>
      <polygon points="120,380 220,300 320,380"></polygon>
      <polygon points="280,380 400,260 520,380"></polygon>
      <polygon points="480,380 600,310 720,380"></polygon>
      <polygon points="680,380 820,250 960,380"></polygon>
      <polygon points="900,380 1040,300 1180,380"></polygon>
      <polygon points="1120,380 1260,260 1400,380"></polygon>
      <polygon points="1340,380 1480,310 1600,380"></polygon>
    </g>
    
    <g fill="#1a1408">
      <rect x="0" y="430" width="1600" height="170"></rect>
      <polygon points="0,430 100,380 200,430"></polygon>
      <polygon points="160,430 260,360 360,430"></polygon>
      <polygon points="340,430 480,330 620,430"></polygon>
      <polygon points="600,430 740,350 880,430"></polygon>
      <polygon points="860,430 1000,340 1140,430"></polygon>
      <polygon points="1100,430 1240,360 1380,430"></polygon>
      <polygon points="1340,430 1480,370 1600,430"></polygon>
    </g>
  </g>

  
  <g fill="#f5c542" shape-rendering="crispEdges">
    <rect x="120" y="80" width="3" height="3"></rect>
    <rect x="240" y="50" width="3" height="3"></rect>
    <rect x="350" y="120" width="2" height="2"></rect>
    <rect x="500" y="70" width="3" height="3"></rect>
    <rect x="640" y="100" width="2" height="2"></rect>
    <rect x="780" y="50" width="3" height="3"></rect>
    <rect x="920" y="110" width="2" height="2"></rect>
    <rect x="1080" y="60" width="3" height="3"></rect>
    <rect x="1220" y="100" width="2" height="2"></rect>
    <rect x="1360" y="80" width="3" height="3"></rect>
    <rect x="1480" y="120" width="2" height="2"></rect>
  </g>

  
  <g transform="translate(1280, 300)" filter="url(#hardShadow)">
    <circle r="160" fill="#6b4910"></circle>
    <circle r="150" fill="url(#goldGrad)"></circle>
    <circle r="140" fill="none" stroke="#7a5210" stroke-width="3" stroke-dasharray="4 6"></circle>
    <text y="14" text-anchor="middle" font-family="Cinzel, serif" font-weight="900" font-size="80" fill="#5b3f1a">G</text>
    
    <g fill="#fff3b8" shape-rendering="crispEdges">
      <rect x="-90" y="-90" width="6" height="6"></rect>
      <rect x="-100" y="-84" width="3" height="3"></rect>
      <rect x="-84" y="-100" width="3" height="3"></rect>
      <rect x="80" y="60" width="6" height="6"></rect>
      <rect x="92" y="66" width="3" height="3"></rect>
    </g>
  </g>

  
  <g transform="translate(80, 230)">
    <text font-family="Cinzel, serif" font-weight="900" font-size="92" fill="url(#goldGrad)" letter-spacing="2">CLAN WORLD</text>
    <text y="74" font-family="IM Fell English, serif" font-style="italic" font-size="44" fill="#ecd9a8">Ælder Whispers</text>
    <text y="142" font-family="Inter, sans-serif" font-weight="600" font-size="22" fill="#d9bf83" letter-spacing="3">OWN THE AGENT  ·  WHISPER THE STRATEGY  ·  WIN THE GOLD</text>

    
    <g transform="translate(0, 180)" font-family="Press Start 2P, monospace" font-size="11">
      <g>
        <rect x="0" y="0" width="290" height="32" fill="url(#solGrad)" stroke="#000" stroke-width="2"></rect>
        <text x="145" y="22" text-anchor="middle" fill="#0b0b0b">SOLANA  MOBILE  ·  dAPP  STORE</text>
      </g>
      <g transform="translate(308, 0)">
        <rect x="0" y="0" width="220" height="32" fill="#f5c542" stroke="#000" stroke-width="2"></rect>
        <text x="110" y="22" text-anchor="middle" fill="#2a1d0c">$GOLD  ECONOMY</text>
      </g>
      <g transform="translate(546, 0)">
        <rect x="0" y="0" width="200" height="32" fill="#1b1308" stroke="#f5c542" stroke-width="2"></rect>
        <text x="100" y="22" text-anchor="middle" fill="#f5c542">AI  AGENT  ARENA</text>
      </g>
    </g>
  </g>

  
  <g fill="#f5c542" shape-rendering="crispEdges" opacity="0.7">
    <rect x="20" y="20" width="40" height="3"></rect><rect x="20" y="20" width="3" height="40"></rect>
    <rect x="1540" y="20" width="40" height="3"></rect><rect x="1577" y="20" width="3" height="40"></rect>
    <rect x="20" y="577" width="40" height="3"></rect><rect x="20" y="540" width="3" height="40"></rect>
    <rect x="1540" y="577" width="40" height="3"></rect><rect x="1577" y="540" width="3" height="40"></rect>
  </g>
</svg>