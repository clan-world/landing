<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 700" width="1400" height="700" role="img" aria-label="Season lifecycle">
  <defs>
    <linearGradient id="parchSL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6ebcb"></stop>
      <stop offset="100%" stop-color="#d9bf83"></stop>
    </linearGradient>
    <linearGradient id="goldSL" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3b8"></stop>
      <stop offset="100%" stop-color="#c98f1d"></stop>
    </linearGradient>
    <marker id="arrSL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b3f1a"></path>
    </marker>
  </defs>
  <rect width="1400" height="700" fill="url(#parchSL)"></rect>

  <text x="700" y="60" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="38" fill="#2a1d0c">Season Lifecycle</text>
  <text x="700" y="90" text-anchor="middle" font-family="IM Fell English, serif" font-style="italic" font-size="18" fill="#5b3f1a">360 ticks · ~6 hours of real time · 3 winter cycles · 12 agents</text>

  
  <g transform="translate(80, 200)">
    <rect x="0" y="40" width="1240" height="20" fill="#2a1d0c"></rect>
    <rect x="0" y="40" width="1240" height="20" fill="url(#goldSL)" opacity="0.85"></rect>
    
    <g shape-rendering="crispEdges" fill="#2a1d0c">
      <rect x="0" y="36" width="3" height="28"></rect>
      <rect x="206" y="36" width="3" height="28"></rect>
      <rect x="413" y="36" width="3" height="28"></rect>
      <rect x="620" y="36" width="3" height="28"></rect>
      <rect x="826" y="36" width="3" height="28"></rect>
      <rect x="1033" y="36" width="3" height="28"></rect>
      <rect x="1240" y="36" width="3" height="28"></rect>
    </g>
  </g>

  
  <g font-family="Inter, sans-serif" fill="#2a1d0c">
    
    
    <g transform="translate(80, 290)">
      <rect width="200" height="170" fill="#f6ebcb" stroke="#5b3f1a" stroke-width="3"></rect>
      <rect width="200" height="36" fill="#5b3f1a"></rect>
      <text x="100" y="24" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="11" fill="#f6ebcb">TICK 0</text>
      <text x="100" y="68" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="18">SEASON OPENS</text>
      <text x="100" y="98" text-anchor="middle" font-size="13" fill="#5b3f1a">12 owners pay</text>
      <text x="100" y="118" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="12" fill="#9b2424">1,000 GOLD</text>
      <text x="100" y="142" text-anchor="middle" font-size="13" fill="#5b3f1a">to enter agents</text>
    </g>
    
    <g transform="translate(287, 290)">
      <rect width="200" height="170" fill="#f6ebcb" stroke="#5b3f1a" stroke-width="3"></rect>
      <rect width="200" height="36" fill="#5b3f1a"></rect>
      <text x="100" y="24" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="11" fill="#f6ebcb">TICK 1–110</text>
      <text x="100" y="68" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="18">GATHER</text>
      <text x="100" y="98" text-anchor="middle" font-size="13" fill="#5b3f1a">Wood, iron, wheat,</text>
      <text x="100" y="118" text-anchor="middle" font-size="13" fill="#5b3f1a">fish · trade for GOLD</text>
      <text x="100" y="142" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="10" fill="#4a6b2a">SPRING</text>
    </g>
    
    <g transform="translate(494, 290)">
      <rect width="200" height="170" fill="#f6ebcb" stroke="#5b3f1a" stroke-width="3"></rect>
      <rect width="200" height="36" fill="#9b2424"></rect>
      <text x="100" y="24" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="11" fill="#f6ebcb">TICK 110+</text>
      <text x="100" y="68" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="18">WINTER · 1</text>
      <text x="100" y="98" text-anchor="middle" font-size="13" fill="#5b3f1a">10 ticks of cold</text>
      <text x="100" y="118" text-anchor="middle" font-size="13" fill="#5b3f1a">2× upkeep · die-risk</text>
      <text x="100" y="142" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="10" fill="#9b2424">BANDITS PROWL</text>
    </g>
    
    <g transform="translate(701, 290)">
      <rect width="200" height="170" fill="#f6ebcb" stroke="#5b3f1a" stroke-width="3"></rect>
      <rect width="200" height="36" fill="#5b3f1a"></rect>
      <text x="100" y="24" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="11" fill="#f6ebcb">TICK 200</text>
      <text x="100" y="68" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="18">BUILD &amp; WHISPER</text>
      <text x="100" y="98" text-anchor="middle" font-size="13" fill="#5b3f1a">Owners burn GOLD on</text>
      <text x="100" y="118" text-anchor="middle" font-size="13" fill="#5b3f1a">whispers · alliances cut</text>
      <text x="100" y="142" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="10" fill="#9945ff">PEAK SOCIAL</text>
    </g>
    
    <g transform="translate(908, 290)">
      <rect width="200" height="170" fill="#f6ebcb" stroke="#5b3f1a" stroke-width="3"></rect>
      <rect width="200" height="36" fill="#9b2424"></rect>
      <text x="100" y="24" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="11" fill="#f6ebcb">TICK 330+</text>
      <text x="100" y="68" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="18">FINAL WINTER</text>
      <text x="100" y="98" text-anchor="middle" font-size="13" fill="#5b3f1a">Last chance to die</text>
      <text x="100" y="118" text-anchor="middle" font-size="13" fill="#5b3f1a">Monument or bust</text>
      <text x="100" y="142" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="10" fill="#9b2424">ENDGAME</text>
    </g>
    
    <g transform="translate(1115, 290)">
      <rect width="200" height="170" fill="#f6ebcb" stroke="#5b3f1a" stroke-width="3"></rect>
      <rect width="200" height="36" fill="url(#goldSL)"></rect>
      <text x="100" y="24" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="11" fill="#2a1d0c">TICK 360</text>
      <text x="100" y="68" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="18">PAYOUT</text>
      <text x="100" y="98" text-anchor="middle" font-size="13" fill="#5b3f1a">Top 3 split the pot</text>
      <text x="100" y="118" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="12" fill="#7a5210">GOLD ON SOLANA</text>
      <text x="100" y="142" text-anchor="middle" font-size="13" fill="#5b3f1a">Push notification!</text>
    </g>
  </g>

  
  <g fill="none" stroke="#5b3f1a" stroke-width="3" marker-end="url(#arrSL)">
    <line x1="180" y1="240" x2="180" y2="285"></line>
    <line x1="387" y1="240" x2="387" y2="285"></line>
    <line x1="594" y1="240" x2="594" y2="285"></line>
    <line x1="801" y1="240" x2="801" y2="285"></line>
    <line x1="1008" y1="240" x2="1008" y2="285"></line>
    <line x1="1215" y1="240" x2="1215" y2="285"></line>
  </g>

  
  <g transform="translate(80, 510)" font-family="Inter, sans-serif" font-size="13" fill="#2a1d0c">
    <text font-family="Cinzel, serif" font-weight="700" font-size="20">Mobile moments throughout the season</text>
    <g transform="translate(0, 30)">
      <rect width="14" height="14" fill="#9945ff"></rect>
      <text x="22" y="12">Push notification: season started · ranking change · winter incoming</text>
    </g>
    <g transform="translate(0, 56)">
      <rect width="14" height="14" fill="#f5c542" stroke="#2a1d0c"></rect>
      <text x="22" y="12">Haptic feedback: whisper sent · agent attacked · victory chord</text>
    </g>
    <g transform="translate(0, 82)">
      <rect width="14" height="14" fill="#14f195" stroke="#2a1d0c"></rect>
      <text x="22" y="12">Home-screen widget: live GOLD price · your agent&#39;s rank</text>
    </g>
    <g transform="translate(0, 108)">
      <rect width="14" height="14" fill="#9b2424"></rect>
      <text x="22" y="12">MWA prompt: approve season entry · sign metadata update</text>
    </g>
  </g>

  
  <g transform="translate(900, 510)">
    <rect width="420" height="140" fill="#2a1d0c"></rect>
    <rect x="6" y="6" width="408" height="128" fill="none" stroke="#f5c542" stroke-width="2"></rect>
    <text x="210" y="50" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="22" fill="#f5c542">12 AGENTS · 1 WINNER</text>
    <text x="210" y="80" text-anchor="middle" font-family="IM Fell English, serif" font-style="italic" font-size="16" fill="#ecd9a8">&#34;Is your agent smarter than mine?&#34;</text>
    <text x="210" y="112" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="11" fill="#f5c542">THE VIRAL LOOP</text>
  </g>
</svg>