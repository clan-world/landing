<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 600" width="1400" height="600" role="img" aria-label="Architecture: Solana-first, cross-chain engine">
  <defs>
    <linearGradient id="parchAR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f6ebcb"></stop>
      <stop offset="100%" stop-color="#d9bf83"></stop>
    </linearGradient>
    <linearGradient id="solGradAR" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#9945ff"></stop>
      <stop offset="100%" stop-color="#14f195"></stop>
    </linearGradient>
    <linearGradient id="goldAR" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff3b8"></stop>
      <stop offset="100%" stop-color="#c98f1d"></stop>
    </linearGradient>
    <marker id="arrAR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#5b3f1a"></path>
    </marker>
  </defs>
  <rect width="1400" height="600" fill="url(#parchAR)"></rect>

  <text x="700" y="60" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="36" fill="#2a1d0c">Solana-First UX. Cross-chain Engine Under the Hood.</text>
  <text x="700" y="90" text-anchor="middle" font-family="IM Fell English, serif" font-style="italic" font-size="17" fill="#5b3f1a">Players mostly transact on Solana. The rest is abstracted.</text>

  
  <g transform="translate(560, 130)">
    <rect width="280" height="80" fill="#f6ebcb" stroke="#2a1d0c" stroke-width="3"></rect>
    <text x="140" y="34" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="18">Player on Android</text>
    <text x="140" y="58" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="10" fill="#5b3f1a">SEEKER · NATIVE APK</text>
  </g>
  <line x1="700" y1="210" x2="700" y2="248" stroke="#5b3f1a" stroke-width="3" marker-end="url(#arrAR)"></line>

  
  <g transform="translate(560, 250)">
    <rect width="280" height="60" fill="url(#solGradAR)" stroke="#2a1d0c" stroke-width="3"></rect>
    <text x="140" y="38" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="12" fill="#0b0b0b">MOBILE WALLET ADAPTER</text>
  </g>
  <line x1="700" y1="310" x2="700" y2="348" stroke="#5b3f1a" stroke-width="3" marker-end="url(#arrAR)"></line>

  
  <g transform="translate(380, 350)">
    <rect width="640" height="120" fill="#1b1308" stroke="#f5c542" stroke-width="3"></rect>
    <rect x="6" y="6" width="628" height="108" fill="none" stroke="#9945ff" stroke-width="1"></rect>
    <text x="320" y="36" text-anchor="middle" font-family="Cinzel, serif" font-weight="800" font-size="22" fill="#f5c542">SOLANA — Player-facing economy</text>
    <text x="320" y="62" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#ecd9a8">$GOLD token · iNFT pair NFT · MWA signing · marketplace · seasons · payouts</text>
    <g transform="translate(40, 78)" font-family="Press Start 2P, monospace" font-size="9" fill="#f5c542">
      <text>· MINT</text>
      <text x="100">· RENT</text>
      <text x="200">· TRADE</text>
      <text x="300">· ENTER</text>
      <text x="400">· WHISPER</text>
      <text x="510">· EARN</text>
    </g>
  </g>

  
  
  <g transform="translate(1080, 350)">
    <rect width="260" height="120" fill="#f6ebcb" stroke="#5b3f1a" stroke-width="2"></rect>
    <text x="130" y="32" text-anchor="middle" font-family="Cinzel, serif" font-weight="700" font-size="16">Game Engine</text>
    <text x="130" y="58" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="10" fill="#9945ff">BASE</text>
    <text x="130" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b3f1a">In-world tick simulation,</text>
    <text x="130" y="96" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b3f1a">resource trading, missions</text>
  </g>
  
  <g transform="translate(1020, 395)">
    <line x1="0" y1="15" x2="60" y2="15" stroke="#5b3f1a" stroke-width="3"></line>
    <rect x="-50" y="-8" width="50" height="46" fill="#9945ff" stroke="#2a1d0c" stroke-width="2"></rect>
    <text x="-25" y="10" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="8" fill="#f6ebcb">WORM</text>
    <text x="-25" y="22" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="8" fill="#f6ebcb">HOLE</text>
    <text x="-25" y="34" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="8" fill="#f6ebcb">NTT</text>
  </g>

  
  <g transform="translate(60, 350)">
    <rect width="260" height="120" fill="#f6ebcb" stroke="#5b3f1a" stroke-width="2"></rect>
    <text x="130" y="32" text-anchor="middle" font-family="Cinzel, serif" font-weight="700" font-size="16">Agent Identity</text>
    <text x="130" y="58" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="10" fill="#14f195">0G iNFT (ERC-7857)</text>
    <text x="130" y="80" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b3f1a">Persistent metadata, memory,</text>
    <text x="130" y="96" text-anchor="middle" font-family="Inter, sans-serif" font-size="11" fill="#5b3f1a">paymaster (WIP)</text>
  </g>
  <g transform="translate(320, 395)">
    <line x1="0" y1="15" x2="60" y2="15" stroke="#5b3f1a" stroke-width="3"></line>
    <rect x="60" y="-8" width="50" height="46" fill="#14f195" stroke="#2a1d0c" stroke-width="2"></rect>
    <text x="85" y="10" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="8" fill="#0b0b0b">SIG</text>
    <text x="85" y="22" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="8" fill="#0b0b0b">RELAY</text>
    <text x="85" y="34" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="8" fill="#0b0b0b">ABS</text>
  </g>

  
  <g transform="translate(80, 510)">
    <rect width="1240" height="60" fill="#2a1d0c"></rect>
    <text x="620" y="30" text-anchor="middle" font-family="Cinzel, serif" font-weight="700" font-size="18" fill="#f5c542">Players touch Solana. Everything else is wired underneath.</text>
    <text x="620" y="50" text-anchor="middle" font-family="Press Start 2P, monospace" font-size="10" fill="#ecd9a8">SOLANA → WORMHOLE → BASE  ·  SOLANA → 0G iNFT METADATA</text>
  </g>
</svg>